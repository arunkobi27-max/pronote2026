<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRONOTE - Connexion</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #eef2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .header {
            background-color: #00605B;
            width: 100%;
            padding: 20px 0;
            color: white;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .login-box {
            background: white;
            margin-top: 50px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            color: #444;
            text-align: center;
            font-size: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #00605B;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #00605B;
        }

        #error-message {
            color: #d9534f;
            background-color: #f2dede;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none; /* Caché par défaut */
            text-align: center;
        }

        .btn {
            background-color: #00605B;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #004d49;
        }
    </style>
</head>
<body>

    <div class="header">PRONOTE</div>

    <div class="login-box">
        <h2>ESPACE ÉLÈVES</h2>
        
        <div id="error-message">Identifiants incorrects</div>

        <form id="loginForm">
            <div class="input-group">
                <label>Identifiant</label>
                <input type="text" id="username" placeholder="Nom d'utilisateur" required>
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Se connecter</button>
        </form>
    </div>

    <script>
        // On définit les identifiants autorisés ici
        const VALID_USER = "mon-pseudo";
        const VALID_PASS = "admin123";

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Empêche la page de se recharger

            const userEntry = document.getElementById('username').value;
            const passEntry = document.getElementById('password').value;

            if (userEntry === VALID_USER && passEntry === VALID_PASS) {
                // Si c'est correct, on redirige vers le dashboard
                window.location.href = "dashboard.html";
            } else {
                // Sinon on affiche l'erreur
                errorDiv.style.display = "block";
                // On efface le mot de passe pour des raisons de sécurité
                document.getElementById('password').value = "";
            }
        });
    </script>

</body>
</html>
